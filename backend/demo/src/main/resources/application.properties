# ===================== 编码配置 =====================
# 强制使用 UTF-8 编码，避免乱码
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===================== 数据库配置（MySQL数据库） =====================
# MySQL数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/ai_job_recommender?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# 数据库用户名
spring.datasource.username=root
# 数据库密码（请修改为你的MySQL密码）
spring.datasource.password=123456
# JDBC 驱动
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 连接池配置（HikariCP，Spring Boot 2.x 默认）
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===================== Dify AI 配置 =====================
# 你提供的密钥
dify.api.key=app-EVyWMufVAyW5fe0N1OxFffR9
# 从链接提取的工作流 ID
dify.workflow.id=M8qFQcZv13mSs2wr
# Dify 工作流执行 URL
dify.workflow.url=https://api.dify.ai/v1/workflows/${dify.workflow.id}/run

# ===================== 文件上传配置 =====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================== JPA/Hibernate 配置 =====================
# 自动更新表结构（开发环境用，生产环境建议用 validate 或 none）
spring.jpa.hibernate.ddl-auto=update
# 打印 SQL 语句（开发调试用）
spring.jpa.show-sql=true
# 格式化 SQL 输出（开发调试用）
spring.jpa.properties.hibernate.format_sql=true
# MySQL 8.0+ 方言
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
